name: 'Laravel Hack Auditor'
description: 'AI-powered security scanning for Laravel apps. Posts findings as PR review comments with inline annotations.'
author: 'mahdi-salmanzade'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  api-key:
    description: 'API key for the AI provider (Anthropic, OpenAI, or Gemini)'
    required: true
  provider:
    description: 'AI provider (anthropic, openai, gemini)'
    required: false
    default: 'anthropic'
  model:
    description: 'AI model to use (provider-specific). Leave empty for provider default.'
    required: false
    default: ''
  severity:
    description: 'Minimum severity to report (low, medium, high, critical)'
    required: false
    default: 'low'
  base-branch:
    description: 'Base branch for diff comparison. Defaults to auto-detect (main/master).'
    required: false
    default: ''
  scan-path:
    description: 'Specific file or directory to scan (e.g., "app/Http/Controllers")'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for posting PR comments. Defaults to the automatic token.'
    required: false
    default: ${{ github.token }}
  install-package:
    description: 'Install hack-auditor via Composer before scanning (true/false)'
    required: false
    default: 'true'
  fail-on:
    description: 'Fail the check if findings at this severity or above exist (none, low, medium, high, critical)'
    required: false
    default: 'none'
  token-limit:
    description: 'Maximum token budget for the scan (0 = unlimited)'
    required: false
    default: ''

outputs:
  score:
    description: 'Overall security score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  total:
    description: 'Total number of findings'
    value: ${{ steps.scan.outputs.total }}
  critical:
    description: 'Number of critical findings'
    value: ${{ steps.scan.outputs.critical }}
  high:
    description: 'Number of high findings'
    value: ${{ steps.scan.outputs.high }}
  medium:
    description: 'Number of medium findings'
    value: ${{ steps.scan.outputs.medium }}
  low:
    description: 'Number of low findings'
    value: ${{ steps.scan.outputs.low }}
  json_path:
    description: 'Path to the raw JSON results file'
    value: ${{ steps.scan.outputs.json_path }}

runs:
  using: composite
  steps:
    - name: Install Hack Auditor
      if: inputs.install-package == 'true'
      shell: bash
      run: |
        if composer show mahdisphp/laravel-hack-auditor 2>/dev/null; then
          echo "hack-auditor already installed, skipping."
        else
          composer require mahdisphp/laravel-hack-auditor --dev --no-interaction --no-progress
        fi

    - name: Run security scan
      id: scan
      shell: bash
      run: bash "${{ github.action_path }}/scripts/scan.sh"
      env:
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_SEVERITY: ${{ inputs.severity }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_SCAN_PATH: ${{ inputs.scan-path }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_TOKEN_LIMIT: ${{ inputs.token-limit }}

    - name: Post PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        RESULTS_PATH: ${{ steps.scan.outputs.json_path }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const script = require('${{ github.action_path }}/scripts/comment.js')
          await script({ github, context, core })
